name: budget_mantra_flutter
description: Budget Mantra — AI-powered personal finance for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP & API
  dio: ^5.8.0+1

  # Secure storage (tokens + encryption key)
  flutter_secure_storage: ^9.2.4

  # Local cache
  shared_preferences: ^2.3.5

  # Icons
  cupertino_icons: ^1.0.8

  # Animations
  lottie: ^3.3.1

  # Charts
  fl_chart: ^0.70.2

  # Biometric auth
  local_auth: ^2.3.0

  # Formatting / localisation
  intl: ^0.20.2

  # Image caching
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
